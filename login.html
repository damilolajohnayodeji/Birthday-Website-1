<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claire's Birthday Vault — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #fdf8f2;
      --blush:      #f5e6dc;
      --rose:       #e8b4a0;
      --deep-rose:  #c47d68;
      --wine:       #7a3f35;
      --gold:       #c9a96e;
      --warm-gray:  #8a7d74;
      --text-dark:  #2e1f1a;
      --text-mid:   #5a433c;
      --text-light: #9c8a83;
      --white:      #ffffff;
      --shadow-sm:  0 2px 12px rgba(122,63,53,.08);
      --shadow-md:  0 6px 32px rgba(122,63,53,.13);
      --shadow-lg:  0 16px 56px rgba(122,63,53,.18);
      --radius:     16px;
      --radius-lg:  28px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Split layout */
    .login-wrapper {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Left decorative panel */
    .login-panel-left {
      flex: 1;
      background: linear-gradient(160deg, #f5d5c8 0%, #eec9b5 40%, #f0d9c4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
      position: relative;
      overflow: hidden;
    }

    .left-decoration {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .left-decoration::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.35), transparent 70%);
      top: -100px; left: -80px;
    }
    .left-decoration::after {
      content: '';
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,.2), transparent 70%);
      bottom: -60px; right: -60px;
    }

    .left-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .script-name {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(3.5rem, 7vw, 5.5rem);
      color: var(--wine);
      line-height: 1.1;
      margin-bottom: 18px;
      text-shadow: 0 2px 12px rgba(122,63,53,.15);
    }

    .left-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      font-weight: 300;
      color: var(--text-mid);
      max-width: 300px;
      line-height: 1.7;
    }

    .left-ornament {
      margin: 28px auto;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--gold);
      font-size: 20px;
    }
    .left-ornament-line {
      width: 60px;
      height: 1px;
      background: rgba(201,169,110,.5);
    }

    /* Floating petals */
    .petal {
      position: absolute;
      font-size: 22px;
      opacity: 0.5;
      animation: floatPetal 8s ease-in-out infinite;
    }
    .petal:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
    .petal:nth-child(2) { top: 70%; left: 20%; animation-delay: 2s; font-size:16px;}
    .petal:nth-child(3) { top: 30%; right: 12%; animation-delay: 4s; font-size:18px;}
    .petal:nth-child(4) { bottom: 20%; right: 18%; animation-delay: 1.5s; }

    @keyframes floatPetal {
      0%,100%{ transform: translateY(0) rotate(0deg); }
      50%    { transform: translateY(-18px) rotate(12deg); }
    }

    /* Right form panel */
    .login-panel-right {
      width: 480px;
      min-width: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 52px;
      background: var(--white);
    }

    .login-form-container {
      width: 100%;
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
    }

    .form-header {
      margin-bottom: 40px;
    }
    .form-header-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--deep-rose);
      margin-bottom: 10px;
    }
    .form-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 500;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .form-header p {
      font-size: 14px;
      font-weight: 300;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* Divider */
    .form-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(196,125,104,.2), transparent);
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 9px;
    }

    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 16px;
      pointer-events: none;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1.5px solid rgba(196,125,104,.22);
      border-radius: var(--radius);
      padding: 14px 18px 14px 44px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text-dark);
      background: var(--cream);
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      outline: none;
    }
    input::placeholder { color: var(--text-light); }
    input:focus {
      border-color: var(--deep-rose);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(196,125,104,.10);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--deep-rose) 0%, #b5604f 100%);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      padding: 16px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(196,125,104,.38);
      transition: transform 0.22s cubic-bezier(.22,1,.36,1), box-shadow 0.22s;
      margin-top: 8px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(196,125,104,.45);
    }
    .btn-login:active { transform: translateY(0); }

    /* Error message */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fef0ed;
      border: 1px solid rgba(196,125,104,.3);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13.5px;
      color: var(--wine);
      margin-top: 18px;
    }
    .error-msg.show { display: flex; }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-light);
      text-decoration: none;
      margin-top: 28px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--deep-rose); }

    /* ─── Animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shakeX {
      0%,100%{ transform:translateX(0); }
      20%    { transform:translateX(-8px); }
      40%    { transform:translateX(7px); }
      60%    { transform:translateX(-5px); }
      80%    { transform:translateX(4px); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 840px) {
      .login-panel-left { display: none; }
      .login-panel-right {
        width: 100%;
        min-width: unset;
        padding: 60px 28px;
      }
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <!-- Left Decorative Panel -->
  <div class="login-panel-left">
    <div class="left-decoration"></div>
    <span class="petal">🌸</span>
    <span class="petal">✦</span>
    <span class="petal">🌼</span>
    <span class="petal">🎀</span>

    <div class="left-content">
      <div class="script-name">Claire</div>
      <div class="left-ornament">
        <div class="left-ornament-line"></div>
        <span>✦</span>
        <div class="left-ornament-line"></div>
      </div>
      <p class="left-tagline">
        Your birthday vault is waiting —<br>full of love from the people who cherish you.
      </p>
    </div>
  </div>

  <!-- Right Form Panel -->
  <div class="login-panel-right">
    <div class="login-form-container">

      <div class="form-header">
        <p class="form-header-label">Birthday Vault Access</p>
        <h1>Welcome Back,<br>Claire 💛</h1>
        <p>Sign in to see all the beautiful messages written just for you.</p>
      </div>

      <div class="form-divider"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="username"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>
      </div>

      <button class="btn-login" onclick="attemptLogin()">
        Open My Birthday Vault →
      </button>

      <div class="error-msg" id="error-msg">
        <span>✗</span>
        <span>Incorrect credentials. Please try again.</span>
      </div>

      <br>
      <a href="index.html" class="back-link">← Back to message form</a>

    </div>
  </div>

</div>

<script>
  // Credentials — in production, this would be server-side
  const VALID_USER = 'Claire725';
  const VALID_PASS = '12345678';

  function attemptLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');

    if (user === VALID_USER && pass === VALID_PASS) {
      // Set session flag
      sessionStorage.setItem('claire_auth', 'true');
      // Animate out then redirect
      document.querySelector('.login-form-container').style.opacity = '0';
      document.querySelector('.login-form-container').style.transform = 'translateY(-16px)';
      document.querySelector('.login-form-container').style.transition = 'opacity 0.4s, transform 0.4s';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 400);
    } else {
      errEl.classList.add('show');
      // Shake form
      const container = document.querySelector('.login-form-container');
      container.style.animation = 'none';
      container.offsetHeight;
      container.style.animation = 'shakeX 0.45s cubic-bezier(.36,.07,.19,.97)';
      setTimeout(() => { container.style.animation = ''; }, 500);
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptLogin();
  });
</script>
</body>
</html>
